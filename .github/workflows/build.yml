name: Build Firmware

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =====================================================
      # Checkout
      # =====================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =====================================================
      # Python
      # =====================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # =====================================================
      # Install PlatformIO
      # =====================================================
      - name: Install dependencies
        run: |
          pip install platformio esptool

      # =====================================================
      # Build Cardputer
      # =====================================================
      - name: Build Cardputer
        run: pio run -e ghostble

      # =====================================================
      # Build StickS3
      # =====================================================
      - name: Build StickS3
        run: pio run -e ghostble_sticks3

      # =====================================================
      # Create output folder
      # =====================================================
      - name: Create firmware folder
        run: mkdir firmware

      # =====================================================
      # Merge Cardputer Firmware
      # =====================================================
      - name: Merge Cardputer binaries
        run: |
          BUILD_DIR=.pio/build/ghostble

          if [ -f "$BUILD_DIR/boot_app0.bin" ]; then
            python -m esptool --chip esp32s3 merge-bin \
              -o firmware/GhostBLE-Cardputer.bin \
              --flash-mode dio \
              --flash-freq 40m \
              --flash-size 8MB \
              0x0 $BUILD_DIR/bootloader.bin \
              0x8000 $BUILD_DIR/partitions.bin \
              0xE000 $BUILD_DIR/boot_app0.bin \
              0x10000 $BUILD_DIR/firmware.bin
          else
            python -m esptool --chip esp32s3 merge-bin \
              -o firmware/GhostBLE-Cardputer.bin \
              --flash-mode dio \
              --flash-freq 40m \
              --flash-size 8MB \
              0x0 $BUILD_DIR/bootloader.bin \
              0x8000 $BUILD_DIR/partitions.bin \
              0x10000 $BUILD_DIR/firmware.bin
          fi

      # =====================================================
      # Merge StickS3 Firmware
      # =====================================================
      - name: Merge StickS3 binaries
        run: |
          BUILD_DIR=.pio/build/ghostble_sticks3

          if [ -f "$BUILD_DIR/boot_app0.bin" ]; then
            python -m esptool --chip esp32s3 merge-bin \
              -o firmware/GhostBLE-StickS3.bin \
              --flash-mode dio \
              --flash-freq 40m \
              --flash-size 8MB \
              0x0 $BUILD_DIR/bootloader.bin \
              0x8000 $BUILD_DIR/partitions.bin \
              0xE000 $BUILD_DIR/boot_app0.bin \
              0x10000 $BUILD_DIR/firmware.bin
          else
            python -m esptool --chip esp32s3 merge-bin \
              -o firmware/GhostBLE-StickS3.bin \
              --flash-mode dio \
              --flash-freq 40m \
              --flash-size 8MB \
              0x0 $BUILD_DIR/bootloader.bin \
              0x8000 $BUILD_DIR/partitions.bin \
              0x10000 $BUILD_DIR/firmware.bin
          fi

      # =====================================================
      # Rename with Version
      # =====================================================
      - name: Add version to filenames
        run: |
          VERSION=${{ github.event.release.tag_name }}

          mv firmware/GhostBLE-Cardputer.bin \
             firmware/GhostBLE-Cardputer-${VERSION}.bin

          mv firmware/GhostBLE-StickS3.bin \
             firmware/GhostBLE-StickS3-${VERSION}.bin

      # =====================================================
      # Upload Release Assets
      # =====================================================
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: firmware/*.bin
          