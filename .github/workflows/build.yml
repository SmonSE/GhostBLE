name: Build Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: .pio/build/**/firmware.bin