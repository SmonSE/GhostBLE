name: Build Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build all environments
        run: pio run

      - name: Rename binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cp .pio/build/ghostble/firmware.bin "GhostBLE-Cardputer-${VERSION}.bin"
          cp .pio/build/ghostble-stickcplus2/firmware.bin "GhostBLE-StickCPlus2-${VERSION}.bin"
          cp .pio/build/ghostble-sticks3/firmware.bin "GhostBLE-StickS3-${VERSION}.bin"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: GhostBLE-*.bin
