name: Build Firmware

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ghostble-firmware
          path: .pio/build/